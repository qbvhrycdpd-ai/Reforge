<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REFORGE</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --acc: #ff6b35;
  --bg0: #06060a;
  --bg1: #0e0e14;
  --bg2: #16161e;
  --bg3: #1e1e28;
  --t1: #f0eff4;
  --t2: #9d9ba8;
  --t3: #5e5c6a;
  --ok: #30d158;
  --err: #ff453a;
}
html { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg0);
  color: var(--t1);
  min-height: 100%;
}

/* HEADER */
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: var(--bg1);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  background: linear-gradient(135deg, #ff6b35, #ff9966);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hdr-btn {
  padding: 8px 14px;
  background: var(--bg3);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px;
  color: var(--t2);
  font-size: 13px;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  display: none;
}

/* VIEWS */
.view { display: none; }
.view.active { display: block; }

/* UPLOAD VIEW */
#uploadView {
  padding: 40px 20px;
  text-align: center;
}
#uploadView h2 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
}
#uploadView p {
  color: var(--t2);
  font-size: 15px;
  margin-bottom: 32px;
}
.upload-box {
  background: var(--bg1);
  border: 2px dashed rgba(255,107,53,0.4);
  border-radius: 20px;
  padding: 48px 24px;
  margin-bottom: 32px;
}
.upload-icon {
  font-size: 48px;
  margin-bottom: 16px;
  display: block;
}
.upload-box h3 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}
.upload-box p {
  color: var(--t2);
  font-size: 14px;
  margin-bottom: 24px;
}
/* THE FILE INPUT — plain and visible, no tricks */
#fileInput {
  display: block;
  margin: 0 auto;
  font-size: 16px;
  font-family: 'Outfit', sans-serif;
  color: var(--t1);
  background: var(--acc);
  border: none;
  border-radius: 12px;
  padding: 14px 28px;
  cursor: pointer;
  width: 200px;
}
#fileInput::-webkit-file-upload-button {
  display: none;
}
#fileInput::before {
  content: 'Choose Photo';
  display: block;
  text-align: center;
  font-weight: 600;
  color: #fff;
}

/* EDITOR VIEW */
#editorView { padding-bottom: 20px; }
.mode-tabs {
  display: flex;
  background: var(--bg1);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.mtab {
  flex: 1;
  padding: 12px 4px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--t3);
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
}
.mtab.active { color: var(--acc); border-bottom-color: var(--acc); }

.canvas-wrap {
  position: relative;
  background: #000;
  text-align: center;
  padding: 12px;
}
.canvas-wrap canvas { max-width: 100%; border-radius: 8px; }
#overlayCanvas {
  position: absolute;
  top: 12px; left: 12px;
  width: calc(100% - 24px);
  height: calc(100% - 24px);
  cursor: crosshair;
  border-radius: 8px;
}

/* MASK TOOLS */
.mask-tools {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg1);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.mask-tools.hidden { display: none; }
.tbtn {
  width: 40px; height: 40px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.07);
  background: var(--bg3);
  color: var(--t2);
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
}
.tbtn.active { background: rgba(255,107,53,0.15); color: var(--acc); border-color: rgba(255,107,53,0.4); }
.slider-wrap { display: flex; align-items: center; gap: 8px; flex: 1; }
.slider-lbl { font-size: 12px; color: var(--t3); font-weight: 600; min-width: 28px; text-align: center; }
input[type=range] {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  background: var(--bg3);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--acc);
  border: 3px solid var(--bg1);
}

/* STYLE PANEL */
.style-panel { display: none; padding: 10px 14px; background: var(--bg1); border-bottom: 1px solid rgba(255,255,255,0.07); }
.style-panel.show { display: block; }
.style-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.style-scroll::-webkit-scrollbar { display: none; }
.schip {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.07);
  background: var(--bg2);
  color: var(--t2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
}
.schip.active { border-color: rgba(255,107,53,0.4); background: rgba(255,107,53,0.15); color: var(--acc); }
.str-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.str-lbl { font-size: 12px; color: var(--t3); font-weight: 600; min-width: 70px; }
.str-val { font-size: 12px; color: var(--t2); min-width: 36px; text-align: right; }

/* PROMPT */
.prompt-area {
  padding: 12px 14px;
  background: var(--bg1);
  border-top: 1px solid rgba(255,255,255,0.07);
}
.prompt-chips { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 10px; }
.prompt-chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 14px;
  background: var(--bg3);
  color: var(--t2);
  font-size: 12px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.07);
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
}
.prompt-row { display: flex; gap: 8px; align-items: flex-end; }
textarea {
  flex: 1;
  min-height: 44px;
  max-height: 100px;
  padding: 11px 14px;
  border-radius: 14px;
  border: 1.5px solid rgba(255,255,255,0.07);
  background: var(--bg2);
  color: var(--t1);
  font-size: 15px;
  font-family: 'Outfit', sans-serif;
  resize: none;
  outline: none;
}
textarea:focus { border-color: rgba(255,107,53,0.4); }
textarea::placeholder { color: var(--t3); }
.gen-btn {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, #ff6b35, #ff9966);
  border: none;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  flex-shrink: 0;
}
.gen-btn:disabled { opacity: 0.4; }

/* GENERATING OVERLAY */
.gen-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(6,6,10,0.85);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.gen-overlay.show { display: flex; }
.spinner {
  width: 52px; height: 52px;
  border: 3px solid rgba(255,107,53,0.15);
  border-top-color: var(--acc);
  border-radius: 50%;
  animation: spin 0.85s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.gen-overlay p { color: #fff; font-size: 15px; font-weight: 600; }
.gen-overlay small { color: rgba(255,255,255,0.4); font-size: 13px; }

/* ERROR */
.err-box {
  display: none;
  margin: 12px 14px 0;
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(255,69,58,0.1);
  border: 1px solid rgba(255,69,58,0.3);
  color: var(--err);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}
.err-box.show { display: block; }

/* RESULT VIEW */
#resultView { padding: 12px 14px 32px; }
#resultView img { width: 100%; border-radius: 14px; display: block; margin-bottom: 16px; }
.result-btns { display: flex; gap: 10px; }
.rbtn {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  border: none;
  text-align: center;
}
.rbtn.primary { background: linear-gradient(135deg, #ff6b35, #ff9966); color: #fff; }
.rbtn.sec { background: var(--bg3); color: var(--t1); border: 1px solid rgba(255,255,255,0.07); }
.rbtn.out { background: transparent; color: var(--t2); border: 1px solid rgba(255,255,255,0.07); }

/* TOAST */
#toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg3);
  color: var(--t1);
  padding: 12px 22px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.07);
  transition: transform 0.3s;
  z-index: 200;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.ok { background: var(--ok); color: #fff; border-color: transparent; }
#toast.err { background: var(--err); color: #fff; border-color: transparent; }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">REFORGE</div>
  <button class="hdr-btn" id="newBtn">+ New</button>
</div>

<!-- UPLOAD -->
<div class="view active" id="uploadView">
  <div style="padding: 40px 20px; text-align: center;">
    <div class="upload-box">
      <span class="upload-icon">🖼️</span>
      <h3>Upload an Image</h3>
      <p>Choose a photo from your library</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>
  </div>
</div>

<!-- EDITOR -->
<div class="view" id="editorView">
  <div class="mode-tabs">
    <button class="mtab active" data-mode="inpaint">✏️ Inpaint</button>
    <button class="mtab" data-mode="edit">🪄 Edit</button>
    <button class="mtab" data-mode="style">🎨 Style</button>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="imgCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
  </div>

  <div class="err-box" id="errBox"></div>

  <div class="mask-tools" id="maskTools">
    <button class="tbtn active" id="brushBtn">✏️</button>
    <button class="tbtn" id="eraserBtn">🧹</button>
    <div class="slider-wrap">
      <span class="slider-lbl" id="bLbl">30</span>
      <input type="range" id="bSlider" min="5" max="120" value="30" step="1">
    </div>
    <button class="tbtn" id="undoBtn">↩️</button>
    <button class="tbtn" id="clearBtn">🗑️</button>
  </div>

  <div class="style-panel" id="stylePanel">
    <div class="style-scroll" id="styleGrid"></div>
    <div class="str-row">
      <span class="str-lbl">Strength</span>
      <input type="range" id="strSlider" min="0.3" max="0.95" value="0.65" step="0.05" style="flex:1">
      <span class="str-val" id="strVal">0.65</span>
    </div>
  </div>

  <div class="prompt-area">
    <div class="prompt-chips" id="promptChips"></div>
    <div class="prompt-row">
      <textarea id="ptxt" placeholder="Describe your edit…"></textarea>
      <button class="gen-btn" id="genBtn">✨</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="view" id="resultView">
  <img id="resultImg" alt="Result">
  <div class="result-btns">
    <button class="rbtn out" id="backBtn">← Back</button>
    <button class="rbtn sec" id="editResBtn">Edit This</button>
    <button class="rbtn primary" id="dlBtn">⬇ Save</button>
  </div>
</div>

<!-- GENERATING OVERLAY -->
<div class="gen-overlay" id="genOverlay">
  <div class="spinner"></div>
  <p id="genLbl">Generating…</p>
  <small id="genSub"></small>
  <small id="genTime">0s</small>
</div>

<div id="toast"></div>

<script>
const API_KEY = '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';
const MAX_PX = 768;
const MAX_UNDO = 12;

const CHIPS = {
  inpaint: ['Remove object','Fill naturally','Replace with sky','Add flowers'],
  edit:    ['Make cinematic','Add warm sunlight','Make it night','Add fog'],
  style:   ['Oil painting','Watercolor','Anime style','Vintage photo','Neon cyberpunk'],
};
const STYLES = {
  'Oil painting':  'oil painting style, thick brushstrokes, rich textures',
  'Watercolor':    'watercolor painting, soft washes, delicate lines',
  'Anime style':   'anime art style, vibrant colors, Studio Ghibli',
  'Vintage photo': 'vintage photograph, sepia tones, film grain',
  'Neon cyberpunk':'neon cyberpunk, glowing lights, futuristic',
};

const S = {
  mode: 'inpaint', tool: 'brush',
  brushSize: 30, strength: 0.65,
  drawing: false, lx: 0, ly: 0,
  hasMask: false, undos: [],
  resultUrl: null, busy: false,
  t1: null, t2: null,
};

const $ = id => document.getElementById(id);

const uploadView  = $('uploadView');
const editorView  = $('editorView');
const resultView  = $('resultView');
const fileInput   = $('fileInput');
const imgCanvas   = $('imgCanvas');
const overlayCanvas = $('overlayCanvas');
const maskCanvas  = document.createElement('canvas');
const iCtx = imgCanvas.getContext('2d');
const oCtx = overlayCanvas.getContext('2d');
const mCtx = maskCanvas.getContext('2d');
const maskTools   = $('maskTools');
const stylePanel  = $('stylePanel');
const styleGrid   = $('styleGrid');
const brushBtn    = $('brushBtn');
const eraserBtn   = $('eraserBtn');
const bSlider     = $('bSlider');
const bLbl        = $('bLbl');
const strSlider   = $('strSlider');
const strVal      = $('strVal');
const undoBtn     = $('undoBtn');
const clearBtn    = $('clearBtn');
const ptxt        = $('ptxt');
const promptChips = $('promptChips');
const genBtn      = $('genBtn');
const genOverlay  = $('genOverlay');
const genLbl      = $('genLbl');
const genSub      = $('genSub');
const genTime     = $('genTime');
const errBox      = $('errBox');
const resultImg   = $('resultImg');
const newBtn      = $('newBtn');

function showView(v) {
  [uploadView, editorView, resultView].forEach(x => x.classList.remove('active'));
  ({upload:uploadView, editor:editorView, result:resultView}[v]).classList.add('active');
  newBtn.style.display = v === 'upload' ? 'none' : 'block';
  hideErr();
}

function toast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.className = '', 3000);
}

function showErr(msg) { errBox.textContent = msg; errBox.classList.add('show'); }
function hideErr() { errBox.classList.remove('show'); }

// FILE INPUT
fileInput.addEventListener('change', function() {
  const file = this.files && this.files[0];
  if (file) loadImage(file);
});

function loadImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = function() {
    const scale = Math.min(1, MAX_PX / Math.max(img.width, img.height));
    let w = Math.floor(img.width * scale / 64) * 64 || 64;
    let h = Math.floor(img.height * scale / 64) * 64 || 64;
    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    tmp.getContext('2d').drawImage(img, 0, 0, w, h);
    const ri = new Image();
    ri.onload = function() {
      setupCanvas(ri, w, h);
      showView('editor');
      updateMode();
      toast('Image loaded', 'ok');
    };
    ri.src = tmp.toDataURL('image/png');
    URL.revokeObjectURL(url);
  };
  img.onerror = function() { toast('Could not load image', 'err'); };
  img.src = url;
}

function setupCanvas(img, w, h) {
  imgCanvas.width = w; imgCanvas.height = h;
  overlayCanvas.width = w; overlayCanvas.height = h;
  maskCanvas.width = w; maskCanvas.height = h;
  iCtx.drawImage(img, 0, 0, w, h);
  oCtx.clearRect(0, 0, w, h);
  mCtx.fillStyle = '#ffffff';
  mCtx.fillRect(0, 0, w, h);
  // Fix overlay canvas size to match display
  overlayCanvas.style.width = imgCanvas.offsetWidth + 'px';
  overlayCanvas.style.height = imgCanvas.offsetHeight + 'px';
  S.hasMask = false; S.undos = [];
}

// MODE TABS
document.querySelectorAll('.mtab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.mtab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    S.mode = tab.dataset.mode;
    updateMode();
  });
});

function updateMode() {
  maskTools.classList.toggle('hidden', S.mode !== 'inpaint');
  stylePanel.classList.toggle('show', S.mode === 'style');
  overlayCanvas.style.pointerEvents = S.mode === 'inpaint' ? 'auto' : 'none';
  buildChips();
  hideErr();
}

function buildChips() {
  promptChips.innerHTML = '';
  (CHIPS[S.mode] || []).forEach(function(text) {
    const b = document.createElement('button');
    b.className = 'chip'; b.textContent = text;
    b.addEventListener('click', function() {
      ptxt.value = STYLES[text] || text;
    });
    promptChips.appendChild(b);
  });
}

// STYLE GRID
(function() {
  Object.keys(STYLES).forEach(function(name) {
    const b = document.createElement('button');
    b.className = 'schip'; b.textContent = name;
    b.addEventListener('click', function() {
      document.querySelectorAll('.schip').forEach(function(c) { c.classList.remove('active'); });
      b.classList.add('active');
      ptxt.value = STYLES[name];
    });
    styleGrid.appendChild(b);
  });
})();

// DRAWING
function coords(e) {
  const r = overlayCanvas.getBoundingClientRect();
  const sx = overlayCanvas.width / r.width;
  const sy = overlayCanvas.height / r.height;
  const p = e.touches ? e.touches[0] : e;
  return { x: (p.clientX - r.left) * sx, y: (p.clientY - r.top) * sy };
}
function scaledBrush() {
  const r = overlayCanvas.getBoundingClientRect();
  return S.brushSize * (overlayCanvas.width / r.width);
}
function saveUndo() {
  if (S.undos.length >= MAX_UNDO) S.undos.shift();
  S.undos.push({
    o: oCtx.getImageData(0, 0, overlayCanvas.width, overlayCanvas.height),
    m: mCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height),
  });
}
function undo() {
  if (!S.undos.length) return;
  const s = S.undos.pop();
  oCtx.putImageData(s.o, 0, 0);
  mCtx.putImageData(s.m, 0, 0);
}
function clearMask() {
  saveUndo();
  oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  mCtx.fillStyle = '#ffffff'; mCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
  S.hasMask = false;
}
function paint(x1, y1, x2, y2, dot) {
  const bs = scaledBrush();
  if (S.tool === 'brush') {
    oCtx.globalCompositeOperation = 'source-over';
    oCtx.strokeStyle = 'rgba(255,75,55,0.5)'; oCtx.fillStyle = 'rgba(255,75,55,0.5)';
    oCtx.lineWidth = bs; oCtx.lineCap = 'round'; oCtx.lineJoin = 'round';
    mCtx.globalCompositeOperation = 'source-over';
    mCtx.strokeStyle = '#000000'; mCtx.fillStyle = '#000000';
    mCtx.lineWidth = bs; mCtx.lineCap = 'round'; mCtx.lineJoin = 'round';
    if (dot) {
      oCtx.beginPath(); oCtx.arc(x1,y1,bs/2,0,Math.PI*2); oCtx.fill();
      mCtx.beginPath(); mCtx.arc(x1,y1,bs/2,0,Math.PI*2); mCtx.fill();
    } else {
      oCtx.beginPath(); oCtx.moveTo(x1,y1); oCtx.lineTo(x2,y2); oCtx.stroke();
      mCtx.beginPath(); mCtx.moveTo(x1,y1); mCtx.lineTo(x2,y2); mCtx.stroke();
    }
    S.hasMask = true;
  } else {
    oCtx.globalCompositeOperation = 'destination-out';
    oCtx.lineWidth = bs; oCtx.lineCap = 'round'; oCtx.lineJoin = 'round';
    mCtx.globalCompositeOperation = 'source-over';
    mCtx.strokeStyle = '#ffffff'; mCtx.fillStyle = '#ffffff';
    mCtx.lineWidth = bs; mCtx.lineCap = 'round'; mCtx.lineJoin = 'round';
    if (dot) {
      oCtx.beginPath(); oCtx.arc(x1,y1,bs/2,0,Math.PI*2); oCtx.fill();
      mCtx.beginPath(); mCtx.arc(x1,y1,bs/2,0,Math.PI*2); mCtx.fill();
    } else {
      oCtx.beginPath(); oCtx.moveTo(x1,y1); oCtx.lineTo(x2,y2); oCtx.stroke();
      mCtx.beginPath(); mCtx.moveTo(x1,y1); mCtx.lineTo(x2,y2); mCtx.stroke();
    }
    oCtx.globalCompositeOperation = 'source-over';
    mCtx.globalCompositeOperation = 'source-over';
  }
}

overlayCanvas.addEventListener('pointerdown', function(e) {
  if (S.mode !== 'inpaint' || S.busy) return;
  e.preventDefault(); S.drawing = true; saveUndo();
  const c = coords(e); S.lx = c.x; S.ly = c.y;
  paint(c.x, c.y, c.x, c.y, true);
});
overlayCanvas.addEventListener('pointermove', function(e) {
  if (!S.drawing) return; e.preventDefault();
  const c = coords(e);
  paint(S.lx, S.ly, c.x, c.y, false);
  S.lx = c.x; S.ly = c.y;
});
['pointerup','pointercancel','pointerleave'].forEach(function(ev) {
  overlayCanvas.addEventListener(ev, function() { S.drawing = false; });
});
overlayCanvas.addEventListener('touchstart', function(e) { if (S.mode==='inpaint') e.preventDefault(); }, {passive:false});
overlayCanvas.addEventListener('touchmove', function(e) { if (S.drawing) e.preventDefault(); }, {passive:false});

// TIMER
function startTimer() {
  var t0 = Date.now(); genTime.textContent = '0s'; var pct = 5;
  S.t1 = setInterval(function() { genTime.textContent = Math.floor((Date.now()-t0)/1000)+'s'; }, 1000);
}
function stopTimer() { clearInterval(S.t1); clearInterval(S.t2); }

// CANVAS TO BLOB
function canvasToBlob(canvas) {
  return new Promise(function(res) { canvas.toBlob(res, 'image/png'); });
}

// API CALL
async function hfCall(model, fd) {
  const resp = await fetch('https://api-inference.huggingface.co/models/' + model, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + API_KEY,
      'x-wait-for-model': 'true',
    },
    body: fd,
  });
  if (!resp.ok) {
    var txt = await resp.text();
    var msg = txt;
    try { msg = JSON.parse(txt).error || txt; } catch(e) {}
    if (resp.status === 401) throw new Error('Invalid API key.');
    if (resp.status === 403) throw new Error('Token needs Inference API permission — go to huggingface.co/settings/tokens.');
    if (resp.status === 503) throw new Error('Model loading, wait 30s and try again.');
    throw new Error('Error ' + resp.status + ': ' + msg.slice(0,200));
  }
  var blob = await resp.blob();
  if (blob.size < 500) {
    var t = await blob.text();
    throw new Error('Bad response: ' + t.slice(0,200));
  }
  return blob;
}

// GENERATE
async function generate() {
  var prompt = ptxt.value.trim();
  if (!prompt) { toast('Enter a prompt', 'err'); return; }
  if (S.busy) return;
  hideErr(); S.busy = true; genBtn.disabled = true;
  genOverlay.classList.add('show');
  startTimer();

  try {
    var resultBlob;
    var fd = new FormData();

    if (S.mode === 'inpaint') {
      genLbl.textContent = 'Inpainting…'; genSub.textContent = 'stable-diffusion-2-inpainting';
      var imgBlob = await canvasToBlob(imgCanvas);
      var maskBlob = await canvasToBlob(maskCanvas);
      fd.append('inputs', imgBlob, 'image.png');
      fd.append('mask_image', maskBlob, 'mask.png');
      fd.append('parameters', JSON.stringify({
        prompt: prompt,
        negative_prompt: 'ugly, blurry, distorted',
        num_inference_steps: 25, guidance_scale: 8,
      }));
      resultBlob = await hfCall('stabilityai/stable-diffusion-2-inpainting', fd);

    } else if (S.mode === 'edit') {
      genLbl.textContent = 'Editing…'; genSub.textContent = 'instruct-pix2pix';
      var imgBlob = await canvasToBlob(imgCanvas);
      fd.append('inputs', imgBlob, 'image.png');
      fd.append('parameters', JSON.stringify({
        prompt: prompt,
        negative_prompt: 'ugly, blurry',
        num_inference_steps: 20, image_guidance_scale: 1.5, guidance_scale: 7.5,
      }));
      resultBlob = await hfCall('timbrooks/instruct-pix2pix', fd);

    } else {
      genLbl.textContent = 'Styling…'; genSub.textContent = 'stable-diffusion-v1-5';
      var imgBlob = await canvasToBlob(imgCanvas);
      fd.append('inputs', imgBlob, 'image.png');
      fd.append('parameters', JSON.stringify({
        prompt: prompt + ', highly detailed, masterpiece',
        negative_prompt: 'ugly, blurry, low quality',
        strength: parseFloat(S.strength),
        num_inference_steps: 25, guidance_scale: 7.5,
      }));
      resultBlob = await hfCall('stable-diffusion-v1-5/stable-diffusion-v1-5', fd);
    }

    stopTimer();
    genOverlay.classList.remove('show');
    S.busy = false; genBtn.disabled = false;
    var url = URL.createObjectURL(resultBlob);
    S.resultUrl = url; resultImg.src = url;
    showView('result');

  } catch(e) {
    stopTimer();
    genOverlay.classList.remove('show');
    S.busy = false; genBtn.disabled = false;
    showErr(e.message || String(e));
    toast('Failed', 'err');
    console.error('[REFORGE]', e);
  }
}

// CONTROLS
brushBtn.addEventListener('click', function() { S.tool='brush'; brushBtn.classList.add('active'); eraserBtn.classList.remove('active'); });
eraserBtn.addEventListener('click', function() { S.tool='eraser'; eraserBtn.classList.add('active'); brushBtn.classList.remove('active'); });
bSlider.addEventListener('input', function() { S.brushSize = parseInt(this.value); bLbl.textContent = S.brushSize; });
strSlider.addEventListener('input', function() { S.strength = parseFloat(this.value); strVal.textContent = this.value; });
undoBtn.addEventListener('click', undo);
clearBtn.addEventListener('click', clearMask);
genBtn.addEventListener('click', generate);
ptxt.addEventListener('keydown', function(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); generate(); } });

$('dlBtn').addEventListener('click', function() {
  if (!S.resultUrl) return;
  var a = document.createElement('a');
  a.href = S.resultUrl; a.download = 'reforge-' + Date.now() + '.png'; a.click();
  toast('Saved!', 'ok');
});
$('editResBtn').addEventListener('click', async function() {
  if (!S.resultUrl) return;
  try {
    var b = await (await fetch(S.resultUrl)).blob();
    loadImage(new File([b], 'edit.png', {type: b.type || 'image/png'}));
  } catch(e) { toast('Could not load', 'err'); }
});
$('backBtn').addEventListener('click', function() { showView('editor'); });
newBtn.addEventListener('click', function() { S.resultUrl = null; ptxt.value = ''; showView('upload'); });

// INIT
buildChips();
</script>
