<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REFORGE — AI Image Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0:#06060a; --bg1:#0e0e14; --bg2:#16161e; --bg3:#1e1e28; --bg4:#282834;
  --acc:#ff6b35; --accd:rgba(255,107,53,.15); --accg:rgba(255,107,53,.35);
  --t1:#f0eff4; --t2:#9d9ba8; --t3:#5e5c6a;
  --bdr:rgba(255,255,255,.07); --bdra:rgba(255,107,53,.4);
  --ok:#30d158; --err:#ff453a;
  --r:10px; --rm:16px; --rl:24px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg0);color:var(--t1);height:100dvh;-webkit-tap-highlight-color:transparent;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(255,107,53,.05),transparent),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(120,60,200,.04),transparent);pointer-events:none;z-index:0;}
input,textarea,button{font-family:inherit;font-size:16px;}
button{cursor:pointer;border:none;background:none;color:inherit;}
#app{display:flex;flex-direction:column;height:100dvh;position:relative;z-index:1;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));border-bottom:1px solid var(--bdr);background:var(--bg1);z-index:10;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.5px;background:linear-gradient(135deg,var(--acc),#ff9966);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hbtn{height:34px;padding:0 12px;border-radius:var(--r);display:flex;align-items:center;gap:6px;background:var(--bg3);color:var(--t2);font-size:13px;font-weight:500;border:1px solid var(--bdr);transition:all .2s;}
.hbtn:active{transform:scale(.94);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* VIEWS */
.view{display:none;flex-direction:column;height:100%;}
.view.active{display:flex;}

/* UPLOAD */
#uploadView{align-items:center;justify-content:center;padding:24px;gap:20px;}
.upload-zone{width:100%;max-width:420px;aspect-ratio:4/3;border:2px dashed var(--bdr);border-radius:var(--rl);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;transition:all .3s;background:var(--bg1);position:relative;overflow:hidden;}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--bdra);}
.upload-zone::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,var(--accd) 0%,transparent 70%);opacity:0;transition:opacity .3s;}
.upload-zone:hover::after,.upload-zone.dragover::after{opacity:1;}
.upload-icon{width:68px;height:68px;border-radius:20px;background:linear-gradient(135deg,var(--acc),#ff9966);display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;z-index:1;animation:float 3s ease-in-out infinite;box-shadow:0 8px 32px var(--accg);}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.upload-zone h2{font-weight:600;font-size:18px;position:relative;z-index:1;}
.upload-zone p{font-size:13px;color:var(--t2);position:relative;z-index:1;}
.upload-zone .fmt{font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;}

/* API KEY */
.key-section{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px;}
.key-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;}
.key-row{display:flex;gap:8px;}
.key-input{flex:1;padding:10px 14px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--bg2);color:var(--t1);font-size:13px;font-family:monospace;outline:none;transition:border-color .2s;}
.key-input:focus{border-color:var(--bdra);}
.key-save{padding:10px 16px;border-radius:var(--r);background:var(--acc);color:#fff;font-size:13px;font-weight:600;transition:all .2s;}
.key-save:active{transform:scale(.96);}
.key-status{font-size:12px;color:var(--t3);}
.key-status.ok{color:var(--ok);}
.key-status.bad{color:var(--err);}

/* EDITOR */
#editorView{overflow:hidden;}
.mode-bar{display:flex;background:var(--bg1);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.mtab{flex:1;padding:11px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);border-bottom:2px solid transparent;transition:all .2s;text-align:center;}
.mtab.active{color:var(--acc);border-bottom-color:var(--acc);}

/* CANVAS */
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:var(--bg0);}
.canvas-container{position:relative;max-width:100%;max-height:100%;line-height:0;}
.canvas-container canvas{max-width:100%;max-height:100%;display:block;border-radius:4px;}
#overlayCanvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;cursor:crosshair;border-radius:4px;}
.hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);backdrop-filter:blur(8px);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:5;}
.hint.show{opacity:1;}

/* GEN OVERLAY */
.gen-ov{position:absolute;inset:0;background:rgba(6,6,10,.82);backdrop-filter:blur(16px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;}
.gen-ov.active{display:flex;}
.spinner{width:52px;height:52px;border:3px solid rgba(255,107,53,.15);border-top-color:var(--acc);border-radius:50%;animation:spin .85s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-lbl{font-weight:600;font-size:15px;color:#fff;text-align:center;max-width:260px;}
.gen-sub{font-size:12px;color:rgba(255,255,255,.4);}
.gen-prog-wrap{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.gen-prog{height:100%;background:var(--acc);border-radius:2px;width:0%;transition:width .4s;}
.gen-time{font-size:12px;color:rgba(255,255,255,.5);}

/* TOOLBAR */
.toolbar{flex-shrink:0;background:var(--bg1);border-top:1px solid var(--bdr);padding-bottom:env(safe-area-inset-bottom,0px);}
.mask-tools{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--bdr);}
.mask-tools.hidden{display:none;}
.tbtn{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--bg3);color:var(--t2);flex-shrink:0;transition:all .15s;border:1px solid var(--bdr);}
.tbtn:active{transform:scale(.9);}
.tbtn.active{background:var(--accd);color:var(--acc);border-color:var(--bdra);}
.bslider-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:0;padding:0 4px;}
.bslider-lbl{font-size:11px;color:var(--t3);font-weight:600;min-width:24px;text-align:center;}
.bslider{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:2px;background:var(--bg4);outline:none;min-width:60px;}
.bslider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--acc);border:3px solid var(--bg1);box-shadow:0 0 6px var(--accg);}

/* STYLE PANEL */
.style-panel{padding:10px 12px;border-bottom:1px solid var(--bdr);display:none;}
.style-panel.active{display:block;}
.style-grid{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.style-grid::-webkit-scrollbar{display:none;}
.schip{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--bg2);color:var(--t2);font-size:12px;font-weight:500;white-space:nowrap;transition:all .15s;}
.schip.active{border-color:var(--bdra);background:var(--accd);color:var(--acc);}
.str-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
.str-lbl{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;min-width:60px;}
.str-val{font-size:11px;color:var(--t2);font-weight:600;min-width:32px;text-align:right;}

/* PROMPT */
.prompt-row{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;}
.prompt-wrap{flex:1;min-width:0;}
.chips{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 10px;border-radius:14px;background:var(--bg3);color:var(--t2);font-size:12px;font-weight:500;white-space:nowrap;border:1px solid var(--bdr);transition:all .15s;}
.chip:active{background:var(--accd);color:var(--acc);border-color:var(--bdra);}
.ptxt{width:100%;min-height:42px;max-height:96px;padding:10px 14px;border-radius:var(--rm);border:1.5px solid var(--bdr);background:var(--bg2);color:var(--t1);font-size:15px;line-height:1.4;resize:none;outline:none;transition:border-color .2s;}
.ptxt::placeholder{color:var(--t3);}
.ptxt:focus{border-color:var(--bdra);}
.gbtn{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--acc),#ff9966);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 2px 16px var(--accg);}
.gbtn:active{transform:scale(.9);box-shadow:none;}
.gbtn:disabled{opacity:.35;pointer-events:none;}

/* ERROR */
.err-panel{margin:10px 12px 0;padding:12px 14px;border-radius:var(--rm);background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.25);color:var(--err);font-size:12px;line-height:1.6;display:none;word-break:break-word;}
.err-panel.show{display:block;}
.err-title{font-weight:700;margin-bottom:4px;font-size:13px;}
.err-hint{margin-top:6px;color:rgba(255,69,58,.7);font-size:11px;}

/* RESULT */
#resultView{position:relative;}
.result-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg0);padding:12px;position:relative;}
.result-img-wrap img{max-width:100%;max-height:100%;border-radius:var(--rm);object-fit:contain;animation:fadeUp .4s ease both;}
.rbadge{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;white-space:nowrap;animation:fadeUp .4s .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-actions{display:flex;gap:8px;padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));background:var(--bg1);border-top:1px solid var(--bdr);}
.rbtn{flex:1;padding:13px 8px;border-radius:var(--rm);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;}
.rbtn:active{transform:scale(.97);}
.rbtn.primary{background:linear-gradient(135deg,var(--acc),#ff9966);color:#fff;box-shadow:0 2px 12px var(--accg);}
.rbtn.sec{background:var(--bg3);color:var(--t1);border:1px solid var(--bdr);}
.rbtn.out{background:transparent;border:1px solid var(--bdr);color:var(--t2);}

/* TOAST */
.toast-wrap{position:fixed;top:max(16px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:10px 20px;border-radius:var(--rm);font-size:13px;font-weight:500;background:var(--bg4);color:var(--t1);box-shadow:0 4px 24px rgba(0,0,0,.5);opacity:0;transform:translateY(-10px) scale(.96);transition:all .3s cubic-bezier(.175,.885,.32,1.275);pointer-events:auto;white-space:nowrap;border:1px solid var(--bdr);}
.toast.show{opacity:1;transform:translateY(0) scale(1);}
.toast.err{background:var(--err);color:#fff;border-color:transparent;}
.toast.ok{background:var(--ok);color:#fff;border-color:transparent;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo">REFORGE</div>
    <div style="display:flex;gap:8px">
      <button class="hbtn" id="newBtn" style="display:none">+ New</button>
    </div>
  </div>

  <div class="main">
    <!-- UPLOAD -->
    <div class="view active" id="uploadView">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">🖼️</div>
        <h2>Upload an Image</h2>
        <p style="margin-bottom:16px;">Tap below to choose a photo</p>
        <input type="file" id="fileInput" accept="image/*" style="font-size:17px;color:#ff6b35;background:#1e1e28;border:2px solid #ff6b35;border-radius:12px;padding:12px 20px;width:220px;cursor:pointer;">
      </div>
    </div>

    <!-- EDITOR -->
    <div class="view" id="editorView">
      <div class="mode-bar">
        <button class="mtab active" data-mode="inpaint">✏️ Inpaint</button>
        <button class="mtab" data-mode="edit">🪄 Edit</button>
        <button class="mtab" data-mode="style">🎨 Style</button>
      </div>
      <div class="canvas-wrap">
        <div class="canvas-container" id="canvasCont">
          <canvas id="imgCanvas"></canvas>
          <canvas id="overlayCanvas"></canvas>
        </div>
        <div class="hint" id="hint">Paint the area you want to change</div>
        <div class="gen-ov" id="genOv">
          <div class="spinner"></div>
          <div class="gen-lbl" id="genLbl">Generating…</div>
          <div class="gen-sub" id="genSub"></div>
          <div class="gen-prog-wrap"><div class="gen-prog" id="genProg"></div></div>
          <div class="gen-time" id="genTime">0s</div>
        </div>
      </div>
      <div class="err-panel" id="errPanel">
        <div class="err-title" id="errTitle"></div>
        <div id="errMsg"></div>
        <div class="err-hint">Open browser console (F12) for full details.</div>
      </div>
      <div class="toolbar">
        <div class="mask-tools" id="maskTools">
          <button class="tbtn active" id="brushBtn">✏️</button>
          <button class="tbtn" id="eraserBtn">🧹</button>
          <div class="bslider-wrap">
            <span class="bslider-lbl" id="bLbl">30</span>
            <input type="range" class="bslider" id="bSlider" min="5" max="120" value="30" step="1">
          </div>
          <button class="tbtn" id="undoBtn">↩</button>
          <button class="tbtn" id="clearBtn">🗑</button>
        </div>
        <div class="style-panel" id="stylePanel">
          <div class="style-grid" id="styleGrid"></div>
          <div class="str-row">
            <span class="str-lbl">Strength</span>
            <input type="range" class="bslider" id="strSlider" min="0.3" max="0.95" value="0.65" step="0.05" style="flex:1">
            <span class="str-val" id="strVal">0.65</span>
          </div>
        </div>
        <div class="prompt-row">
          <div class="prompt-wrap">
            <div class="chips" id="chips"></div>
            <textarea class="ptxt" id="ptxt" placeholder="Describe your edit…" rows="1"></textarea>
          </div>
          <button class="gbtn" id="genBtn">✨</button>
        </div>
      </div>
    </div>

    <!-- RESULT -->
    <div class="view" id="resultView">
      <div class="result-img-wrap">
        <img id="resultImg" alt="Result">
        <div class="rbadge" id="rbadge">✓ Done</div>
      </div>
      <div class="result-actions">
        <button class="rbtn out" id="backBtn">← Back</button>
        <button class="rbtn sec" id="editResBtn">Edit This</button>
        <button class="rbtn primary" id="dlBtn">⬇ Save</button>
      </div>
    </div>
  </div>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>

/* ── CONSTANTS ── */
const MAX_PX = 768; // keep small — free tier has limits
const MAX_UNDO = 12;
const CHIPS = {
  inpaint: ['Remove object','Fill naturally','Replace with sky','Add flowers','Smooth background'],
  edit:    ['Make cinematic','Add warm sunlight','Make it night','Convert to sketch','Add fog'],
  style:   ['Oil painting','Watercolor','Anime style','Vintage photo','Neon cyberpunk'],
};
const STYLES = {
  'Oil painting':  'oil painting style, thick brushstrokes, rich textures, painterly',
  'Watercolor':    'watercolor painting, soft washes, delicate lines, artistic',
  'Anime style':   'anime art style, vibrant colors, cel shading, Studio Ghibli',
  'Vintage photo': 'vintage photograph, sepia tones, film grain, retro aesthetic',
  'Neon cyberpunk':'neon cyberpunk, glowing lights, futuristic, dramatic shadows',
};

/* ── STORAGE (Safari-safe) ── */
const store = {
  get(k) { try { return localStorage.getItem(k); } catch(e) { return null; } },
  set(k,v) { try { localStorage.setItem(k,v); } catch(e) {} },
};

/* ── STATE ── */
const S = {
  key: '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',
  mode: 'inpaint',
  tool: 'brush',
  brushSize: 30,
  strength: 0.65,
  drawing: false,
  lx: 0, ly: 0,
  hasMask: false,
  undos: [],
  resultUrl: null,
  busy: false,
  t1: null, t2: null,
};

/* ── DOM ── */
const $  = id => document.getElementById(id);
const uploadView = $('uploadView'), editorView = $('editorView'), resultView = $('resultView');
const uploadZone = $('uploadZone'), fileInput = $('fileInput');
const imgCanvas = $('imgCanvas'), overlayCanvas = $('overlayCanvas');
const maskCanvas = document.createElement('canvas');
const iCtx = imgCanvas.getContext('2d');
const oCtx = overlayCanvas.getContext('2d');
const mCtx = maskCanvas.getContext('2d');
const maskTools = $('maskTools'), stylePanel = $('stylePanel'), styleGrid = $('styleGrid');
const brushBtn = $('brushBtn'), eraserBtn = $('eraserBtn');
const bSlider = $('bSlider'), bLbl = $('bLbl');
const strSlider = $('strSlider'), strVal = $('strVal');
const undoBtn = $('undoBtn'), clearBtn = $('clearBtn');
const ptxt = $('ptxt'), chips = $('chips'), genBtn = $('genBtn');
const genOv = $('genOv'), genLbl = $('genLbl'), genSub = $('genSub');
const genProg = $('genProg'), genTime = $('genTime');
const errPanel = $('errPanel'), errTitle = $('errTitle'), errMsg = $('errMsg');
const resultImg = $('resultImg'), rbadge = $('rbadge');
const newBtn = $('newBtn'), hint = $('hint');

/* ── TOAST ── */
function toast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' '+type : '');
  t.textContent = msg;
  $('toasts').appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3200);
}

/* ── VIEWS ── */
function showView(v) {
  [uploadView,editorView,resultView].forEach(x => x.classList.remove('active'));
  ({upload:uploadView, editor:editorView, result:resultView}[v]).classList.add('active');
  newBtn.style.display = v==='upload' ? 'none' : '';
  hideErr();
}

/* ── INIT ── */
buildChips();

/* ── MODE TABS ── */
document.querySelectorAll('.mtab').forEach(tab => tab.addEventListener('click', () => {
  document.querySelectorAll('.mtab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  S.mode = tab.dataset.mode;
  updateModeUI();
}));
function updateModeUI() {
  maskTools.classList.toggle('hidden', S.mode !== 'inpaint');
  stylePanel.classList.toggle('active', S.mode === 'style');
  overlayCanvas.style.cursor   = S.mode==='inpaint' ? 'crosshair' : 'default';
  overlayCanvas.style.pointerEvents = S.mode==='inpaint' ? 'auto' : 'none';
  buildChips();
  if (S.mode==='inpaint') showHint('Paint over the area you want to change');
  else hint.classList.remove('show');
  hideErr();
}
function showHint(msg) {
  hint.textContent = msg; hint.classList.add('show');
  setTimeout(() => hint.classList.remove('show'), 3000);
}

/* ── CHIPS ── */
function buildChips() {
  chips.innerHTML = '';
  (CHIPS[S.mode]||[]).forEach(text => {
    const b = document.createElement('button');
    b.className='chip'; b.textContent=text;
    b.onclick = () => { ptxt.value = STYLES[text]||text; autoGrow(ptxt); };
    chips.appendChild(b);
  });
}
function buildStyleGrid() {
  styleGrid.innerHTML = '';
  Object.keys(STYLES).forEach(name => {
    const b = document.createElement('button');
    b.className='schip'; b.textContent=name;
    b.onclick = () => {
      document.querySelectorAll('.schip').forEach(c=>c.classList.remove('active'));
      b.classList.add('active');
      ptxt.value = STYLES[name]; autoGrow(ptxt);
    };
    styleGrid.appendChild(b);
  });
}
buildStyleGrid();

/* ── IMAGE LOADING ── */
function loadImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const scale = Math.min(1, MAX_PX / Math.max(img.width, img.height));
    let w = Math.floor(img.width * scale / 64) * 64;
    let h = Math.floor(img.height * scale / 64) * 64;
    w = Math.max(w, 64); h = Math.max(h, 64);

    const tmp = document.createElement('canvas');
    tmp.width=w; tmp.height=h;
    tmp.getContext('2d').drawImage(img, 0, 0, w, h);

    const ri = new Image();
    ri.onload = () => {
      setupCanvas(ri, w, h);
      showView('editor');
      updateModeUI();
      toast('Image loaded','ok');
    };
    ri.src = tmp.toDataURL('image/png');
    URL.revokeObjectURL(url);
  };
  img.onerror = () => { toast('Failed to load image','err'); URL.revokeObjectURL(url); };
  img.src = url;
}

function setupCanvas(img, w, h) {
  [imgCanvas, overlayCanvas, maskCanvas].forEach(c => { c.width=w; c.height=h; });
  iCtx.drawImage(img, 0, 0, w, h);
  oCtx.clearRect(0,0,w,h);
  // Mask: white = keep, black = inpaint
  mCtx.fillStyle = '#ffffff';
  mCtx.fillRect(0,0,w,h);
  S.hasMask=false; S.undos=[];
}

/* ── DRAWING ── */
function coords(e) {
  const r = overlayCanvas.getBoundingClientRect();
  const sx = overlayCanvas.width/r.width, sy = overlayCanvas.height/r.height;
  const p = e.touches ? e.touches[0] : e;
  return { x:(p.clientX-r.left)*sx, y:(p.clientY-r.top)*sy };
}
function scaledBrush() {
  const r = overlayCanvas.getBoundingClientRect();
  return S.brushSize * (overlayCanvas.width/r.width);
}
function saveUndo() {
  if (S.undos.length >= MAX_UNDO) S.undos.shift();
  S.undos.push({
    o: oCtx.getImageData(0,0,overlayCanvas.width,overlayCanvas.height),
    m: mCtx.getImageData(0,0,maskCanvas.width,maskCanvas.height),
  });
}
function undo() {
  if (!S.undos.length) return;
  const s = S.undos.pop();
  oCtx.putImageData(s.o,0,0);
  mCtx.putImageData(s.m,0,0);
}
function clearMask() {
  saveUndo();
  oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  mCtx.fillStyle='#ffffff';
  mCtx.fillRect(0,0,maskCanvas.width,maskCanvas.height);
  S.hasMask=false;
}
function paint(x1,y1,x2,y2,dot) {
  const bs = scaledBrush();
  if (S.tool==='brush') {
    // Overlay: red tint to show painted area
    oCtx.globalCompositeOperation='source-over';
    oCtx.strokeStyle='rgba(255,75,55,0.5)'; oCtx.fillStyle='rgba(255,75,55,0.5)';
    oCtx.lineWidth=bs; oCtx.lineCap='round'; oCtx.lineJoin='round';
    // Mask: BLACK = area to inpaint (standard SD inpainting convention)
    mCtx.globalCompositeOperation='source-over';
    mCtx.strokeStyle='#000000'; mCtx.fillStyle='#000000';
    mCtx.lineWidth=bs; mCtx.lineCap='round'; mCtx.lineJoin='round';
    if (dot) {
      oCtx.beginPath(); oCtx.arc(x1,y1,bs/2,0,Math.PI*2); oCtx.fill();
      mCtx.beginPath(); mCtx.arc(x1,y1,bs/2,0,Math.PI*2); mCtx.fill();
    } else {
      oCtx.beginPath(); oCtx.moveTo(x1,y1); oCtx.lineTo(x2,y2); oCtx.stroke();
      mCtx.beginPath(); mCtx.moveTo(x1,y1); mCtx.lineTo(x2,y2); mCtx.stroke();
    }
    S.hasMask=true;
  } else {
    oCtx.globalCompositeOperation='destination-out';
    oCtx.lineWidth=bs; oCtx.lineCap='round'; oCtx.lineJoin='round';
    mCtx.globalCompositeOperation='source-over';
    mCtx.strokeStyle='#ffffff'; mCtx.fillStyle='#ffffff';
    mCtx.lineWidth=bs; mCtx.lineCap='round'; mCtx.lineJoin='round';
    if (dot) {
      oCtx.beginPath(); oCtx.arc(x1,y1,bs/2,0,Math.PI*2); oCtx.fill();
      mCtx.beginPath(); mCtx.arc(x1,y1,bs/2,0,Math.PI*2); mCtx.fill();
    } else {
      oCtx.beginPath(); oCtx.moveTo(x1,y1); oCtx.lineTo(x2,y2); oCtx.stroke();
      mCtx.beginPath(); mCtx.moveTo(x1,y1); mCtx.lineTo(x2,y2); mCtx.stroke();
    }
    oCtx.globalCompositeOperation='source-over';
    mCtx.globalCompositeOperation='source-over';
  }
}
overlayCanvas.addEventListener('pointerdown', e => {
  if (S.mode!=='inpaint'||S.busy) return;
  e.preventDefault(); S.drawing=true; saveUndo();
  const {x,y}=coords(e); S.lx=x; S.ly=y; paint(x,y,x,y,true);
});
overlayCanvas.addEventListener('pointermove', e => {
  if (!S.drawing) return; e.preventDefault();
  const {x,y}=coords(e); paint(S.lx,S.ly,x,y,false); S.lx=x; S.ly=y;
});
['pointerup','pointercancel','pointerleave'].forEach(ev =>
  overlayCanvas.addEventListener(ev, () => { S.drawing=false; })
);
overlayCanvas.addEventListener('touchstart', e => { if(S.mode==='inpaint') e.preventDefault(); }, {passive:false});
overlayCanvas.addEventListener('touchmove', e => { if(S.drawing) e.preventDefault(); }, {passive:false});

/* ── TIMER ── */
function startTimer() {
  const t0 = Date.now(); genTime.textContent='0s'; let pct=5;
  S.t1 = setInterval(() => { genTime.textContent=Math.floor((Date.now()-t0)/1000)+'s'; },1000);
  S.t2 = setInterval(() => { pct=Math.min(pct+Math.random()*3,88); genProg.style.width=pct.toFixed(0)+'%'; },700);
}
function stopTimer() {
  clearInterval(S.t1); clearInterval(S.t2);
  genProg.style.width='100%';
}

/* ── BLOB HELPERS ── */
function canvasToBlob(canvas) {
  return new Promise(res => canvas.toBlob(res,'image/png'));
}

/* ── ERROR ── */
function showErr(title, msg) { errPanel.classList.add('show'); errTitle.textContent=title; errMsg.textContent=msg; }
function hideErr() { errPanel.classList.remove('show'); }

/* ── HF API ── */
async function hfImageToImage(modelId, imageBlob, prompt, extraParams={}) {
  const API_KEY = S.key;
  // Send raw image blob as body, with parameters as JSON in a multipart or query
  // Correct format: multipart/form-data
  const fd = new FormData();
  fd.append('inputs', imageBlob, 'image.png');
  fd.append('parameters', JSON.stringify({ prompt, ...extraParams }));

  const resp = await fetch('https://api-inference.huggingface.co/models/' + modelId, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + API_KEY,
      'x-wait-for-model': 'true',
    },
    body: fd,
  });

  const ct = resp.headers.get('content-type') || '';
  if (!resp.ok) {
    const txt = await resp.text();
    let msg = txt;
    try { msg = JSON.parse(txt).error || txt; } catch {}
    if (resp.status === 401) throw new Error('Invalid API key.');
    if (resp.status === 403) throw new Error('Token needs "Inference API" permission. Go to huggingface.co/settings/tokens.');
    if (resp.status === 503) throw new Error('Model loading, wait 30s and try again.');
    if (resp.status === 422) throw new Error('Model rejected params: ' + msg.slice(0,200));
    throw new Error('Error ' + resp.status + ': ' + msg.slice(0,200));
  }
  const blob = await resp.blob();
  if (blob.size < 500) {
    const txt = await blob.text();
    throw new Error('Bad response: ' + txt.slice(0,200));
  }
  return blob;
}

async function hfInpaint(imageBlob, maskBlob, prompt) {
  const fd = new FormData();
  fd.append('inputs', imageBlob, 'image.png');
  fd.append('mask_image', maskBlob, 'mask.png');
  fd.append('parameters', JSON.stringify({
    prompt,
    negative_prompt: 'ugly, blurry, distorted',
    num_inference_steps: 25,
    guidance_scale: 8,
  }));
  const resp = await fetch('https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-2-inpainting', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + S.key, 'x-wait-for-model': 'true' },
    body: fd,
  });
  const ct = resp.headers.get('content-type') || '';
  if (!resp.ok) {
    const txt = await resp.text();
    let msg = txt; try { msg = JSON.parse(txt).error || txt; } catch {}
    if (resp.status === 401) throw new Error('Invalid API key.');
    if (resp.status === 403) throw new Error('Token needs Inference API permission.');
    if (resp.status === 503) throw new Error('Model loading, wait 30s and retry.');
    throw new Error('Error ' + resp.status + ': ' + msg.slice(0,200));
  }
  const blob = await resp.blob();
  if (blob.size < 500) throw new Error('Empty response from API.');
  return blob;
}

/* ── GENERATE ── */
async function generate() {
  const prompt = ptxt.value.trim();
  if (!prompt) { toast('Enter a prompt','err'); return; }
  if (S.busy) return;

  hideErr(); S.busy=true; genBtn.disabled=true;
  genOv.classList.add('active'); genProg.style.width='0%';
  startTimer();

  try {
    let resultBlob;

    if (S.mode==='inpaint') {
      genLbl.textContent='Inpainting…'; genSub.textContent='stable-diffusion-2-inpainting';
      const imgBlob  = await canvasToBlob(imgCanvas);
      const maskBlob = await canvasToBlob(maskCanvas);
      resultBlob = await hfInpaint(imgBlob, maskBlob, prompt);

    } else if (S.mode==='edit') {
      genLbl.textContent='Editing…'; genSub.textContent='instruct-pix2pix';
      const imgBlob = await canvasToBlob(imgCanvas);
      resultBlob = await hfImageToImage(
        'timbrooks/instruct-pix2pix', imgBlob, prompt,
        { negative_prompt:'ugly, blurry', num_inference_steps:20, image_guidance_scale:1.5, guidance_scale:7.5 }
      );

    } else {
      genLbl.textContent='Styling…'; genSub.textContent='stable-diffusion-v1-5';
      const imgBlob = await canvasToBlob(imgCanvas);
      resultBlob = await hfImageToImage(
        'stable-diffusion-v1-5/stable-diffusion-v1-5', imgBlob,
        prompt + ', highly detailed, masterpiece',
        { negative_prompt:'ugly, blurry, low quality', strength: S.strength, num_inference_steps:25, guidance_scale:7.5 }
      );
    }

    stopTimer();
    genOv.classList.remove('active');
    S.busy=false; genBtn.disabled=false;

    const url = URL.createObjectURL(resultBlob);
    S.resultUrl=url; resultImg.src=url;
    rbadge.textContent='✓ '+{inpaint:'Inpainted',edit:'Edited',style:'Styled'}[S.mode];
    showView('result');

  } catch(e) {
    stopTimer();
    genOv.classList.remove('active');
    S.busy=false; genBtn.disabled=false;
    showErr('Generation Failed', e.message || String(e));
    toast('Failed','err');
    console.error('[REFORGE]', e);
  }
}

/* ── RESULT ACTIONS ── */
$('dlBtn').onclick = () => {
  if (!S.resultUrl) return;
  const a=document.createElement('a'); a.href=S.resultUrl; a.download='reforge-'+Date.now()+'.png'; a.click();
  toast('Saved!','ok');
};
$('editResBtn').onclick = async () => {
  if (!S.resultUrl) return;
  try { const b=await(await fetch(S.resultUrl)).blob(); loadImage(new File([b],'edit.png',{type:b.type||'image/png'})); }
  catch { toast('Could not load result','err'); }
};
$('backBtn').onclick = () => showView('editor');
newBtn.onclick = () => {
  S.resultUrl=null; ptxt.value=''; fileInput.value=''; showView('upload');
};

/* ── TOOLS ── */
brushBtn.onclick  = () => { S.tool='brush';  brushBtn.classList.add('active');  eraserBtn.classList.remove('active'); };
eraserBtn.onclick = () => { S.tool='eraser'; eraserBtn.classList.add('active'); brushBtn.classList.remove('active'); };
bSlider.oninput   = () => { S.brushSize=parseInt(bSlider.value,10); bLbl.textContent=S.brushSize; };
strSlider.oninput = () => { S.strength=parseFloat(strSlider.value); strVal.textContent=S.strength.toFixed(2); };
undoBtn.onclick   = undo;
clearBtn.onclick  = clearMask;

/* ── UPLOAD ── */
fileInput.addEventListener('change', function(e) {
  const file = e.target.files && e.target.files[0];
  if (file) loadImage(file);
});

/* ── TEXTAREA ── */
function autoGrow(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,96)+'px'; }
ptxt.addEventListener('input', () => autoGrow(ptxt));
ptxt.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();generate();} });
genBtn.onclick = generate;

/* ── INIT ── */
initKey();
buildChips();
</script>
